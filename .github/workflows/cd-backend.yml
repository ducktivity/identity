name: Backend CD

# On push to main that touches backend/ or deploy/: re-verify the commit, run the expand-only goose migration from the runner straight at Neon, then — only if it succeeds — build and push the image to GHCR (immutable sha-<gitsha> + moving latest), then PUSH the deploy onto the box.
#
# Deploy is push-based: the `deploy` job SSHes to the box over Cloudflare Access using a short-lived certificate minted from a service token (no standing SSH key, no public port 22) and runs deploy/deploy.sh <sha>, which checks out that commit, sops-decrypts .env, brings the stack up at the matching sha-<gitsha>, and gates on /readyz — rolling back on the box if it fails. Because that runs synchronously here, a failed deploy turns THIS job red and notifies you through the normal Actions failure path; there is no separate deploy-health alert. Expand-only migrations keep the old container valid against the new schema during the brief cutover.
#
# A deploy/-only change (deploy.sh, ssh-forced-command.sh, compose, …) runs the SAME full pipeline rather than a standalone deploy, so the commit gets its own sha-<gitsha> image (backend layers are cached, so the rebuild is near-instant) — deploy.sh pins that exact sha, so skipping the image job would leave it with no tag to pull. A push touching neither backend/ nor deploy/ skips every job below and stays green.

on:
  push:
    branches: [main]
  # Manual "Run workflow" button for on-demand releases/redeploys of the chosen ref's tip (e.g. re-publish the image after a box-side change, or ship a commit the path filter skipped). It builds that commit's sha-<gitsha> image and runs the full pipeline; see the workflow_dispatch bypass on `changes.run` below.
  workflow_dispatch:

# Least privilege by default; the image job widens to packages: write.
permissions:
  contents: read

jobs:
  # Detect whether anything affecting the backend image changed in this push. We diff against the prior commit rather than using a top-level on.push.paths filter, so this workflow always starts (future frontend/desktop pipelines can hang off its completion) and we just skip the expensive jobs when the backend is untouched — the run stays green.
  changes:
    name: Detect backend changes
    runs-on: ubuntu-latest
    outputs:
      backend: ${{ steps.filter.outputs.backend }}
      deploy: ${{ steps.filter.outputs.deploy }}
      # Run the full pipeline (check -> migrate -> image -> deploy) when EITHER backend/ or deploy/ changed. A deploy/-only change must still build an image: deploy.sh pins sha-<gitsha> of the deployed commit, and that tag would not exist if we skipped the image job. A manual workflow_dispatch always runs it — there is no push diff for the path filter to read, so bypass it.
      run: ${{ steps.filter.outputs.backend == 'true' || steps.filter.outputs.deploy == 'true' || github.event_name == 'workflow_dispatch' }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          # Any change under backend/ or deploy/ triggers a release. Both are single positive globs, so paths-filter ORs the file list — no predicate-quantifier needed.
          filters: |
            backend:
              - 'backend/**'
            deploy:
              - 'deploy/**'

  # Belt-and-suspenders: re-verify the exact commit before we migrate/publish it. Same reusable gate the PR runs. Skipped (run stays green) when backend is unchanged.
  check:
    name: Verify backend
    needs: changes
    if: needs.changes.outputs.run == 'true'
    uses: ./.github/workflows/_backend-check.yml

  # Migrations run here, against Neon, BEFORE the image is published. Expand-only, so the schema and the old container stay compatible during the brief window before the box auto-reconciles. Uses the production environment for DATABASE_URL_MIGRATOR; restrict that environment to main in repo settings.
  migrate:
    name: Apply migrations (goose -> Neon)
    needs: [changes, check]
    if: needs.changes.outputs.run == 'true'
    runs-on: ubuntu-latest
    environment: production
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: backend/go.mod
          cache-dependency-path: backend/go.sum

      - name: Apply migrations (goose -> Neon)
        working-directory: backend
        env:
          DBSTRING: ${{ secrets.DATABASE_URL_MIGRATOR }}
        run: go tool goose -dir sql/schema postgres "$DBSTRING" up

  image:
    name: Build & push image to GHCR
    needs: [changes, check, migrate]
    # Publish only after the gate passed AND the migration applied. Runs for a deploy/-only change too (backend cached, near-instant rebuild) so that commit gets its own sha-<gitsha> tag for deploy.sh to pin — latest alone is not enough because deploy.sh pins the exact sha.
    if: needs.changes.outputs.run == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write # required to push to GHCR
    steps:
      - uses: actions/checkout@v4

      - name: Compute build timestamp
        id: bm
        run: echo "build_time=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> "$GITHUB_OUTPUT"

      - uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }} # auto-provided; no PAT needed

      - name: Derive image tags
        id: meta
        uses: docker/metadata-action@v5
        with:
          # Image name = ghcr.io/<repo owner>/identity-backend (auto-lowercased).
          images: ghcr.io/${{ github.repository_owner }}/identity-backend
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,prefix=sha-
          # immutable per-commit tag, e.g. sha-1a2b3c4

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          # Feed git metadata into the Dockerfile ARGs -> ldflags, so the running binary (and its logs / Sentry release) report the exact commit.
          build-args: |
            VERSION=${{ github.ref_name }}
            COMMIT=${{ github.sha }}
            BUILD_TIME=${{ steps.bm.outputs.build_time }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: Deploy to box (SSH over Cloudflare Access)
    needs: [changes, check, migrate, image]
    # Deploy after this commit's image is published. check/migrate/image now run for any backend/ or deploy/ change (changes.run), so a plain needs-success gate is correct — deploy runs only once all upstream jobs pass, and is skipped (with them) on a push that touches neither.
    if: needs.changes.outputs.run == 'true'
    runs-on: ubuntu-latest
    environment: production
    permissions:
      contents: read
    steps:
      - name: Install cloudflared
        run: |
          curl -fsSL https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64 -o "$RUNNER_TEMP/cloudflared"
          sudo install -m 0755 "$RUNNER_TEMP/cloudflared" /usr/local/bin/cloudflared
          cloudflared --version

      - name: Deploy over Access SSH
        env:
          # The service token authenticates the Access application in front of the SSH hostname; `cloudflared access ssh` (the ProxyCommand) reads these two env vars to open the tunnel. sshd auth is the SSH key below — separate factor.
          TUNNEL_SERVICE_TOKEN_ID: ${{ secrets.TUNNEL_SERVICE_TOKEN_ID }}
          TUNNEL_SERVICE_TOKEN_SECRET: ${{ secrets.TUNNEL_SERVICE_TOKEN_SECRET }}
          SSH_HOSTNAME: ${{ vars.DEPLOY_SSH_HOSTNAME }}
          DEPLOY_SSH_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "$DEPLOY_SSH_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          # No pinned host key: each runner is ephemeral (fresh known_hosts every run), so any
          # pin would be trust-on-first-use anyway. Connection integrity to the box is provided
          # by Cloudflare Access — the tunnel is gated by the service token and the box has no
          # public sshd — so accept-new here rather than carry a DEPLOY_SSH_KNOWN_HOSTS secret.
          cat > ~/.ssh/config <<EOF
          Host $SSH_HOSTNAME
              HostName $SSH_HOSTNAME
              User deploy
              IdentityFile ~/.ssh/deploy_key
              IdentitiesOnly yes
              ProxyCommand /usr/local/bin/cloudflared access ssh --hostname %h
              StrictHostKeyChecking accept-new
          EOF
          # The box's authorized_keys forces deploy/ssh-forced-command.sh, which reads this whole command from $SSH_ORIGINAL_COMMAND, parses out the 40-hex sha, and execs deploy.sh with it. Send the full path + sha so that wrapper's `.../deploy.sh <sha>` pattern matches.
          ssh "$SSH_HOSTNAME" "/opt/ducktivity/identity/deploy/deploy.sh ${{ github.sha }}"
